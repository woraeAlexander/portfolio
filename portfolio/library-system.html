<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --danger: #d63031;
            --light: #f5f6fa;
            --dark: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--secondary);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(108, 92, 231, 0.2);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #5544d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #00a775;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 12px;
        }

        .btn-danger:hover {
            background: #c92e2e;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.9rem;
        }

        .panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .panel h3 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .book-card {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: var(--light);
        }

        .book-card h4 {
            color: var(--primary);
            margin-bottom: 8px;
        }

        .book-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .book-info strong {
            color: var(--dark);
        }

        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status.available {
            background: rgba(0, 184, 148, 0.2);
            color: #00b894;
        }

        .status.borrowed {
            background: rgba(214, 48, 49, 0.2);
            color: #d63031;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-book"></i> Library Management System</h1>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalBooks">0</div>
                <div class="stat-label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="availableBooks">0</div>
                <div class="stat-label">Available</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="borrowedBooks">0</div>
                <div class="stat-label">Borrowed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Members</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('books')"><i class="fas fa-book"></i> Books</button>
            <button class="tab-btn" onclick="switchTab('borrow')"><i class="fas fa-arrow-right"></i> Borrow/Return</button>
            <button class="tab-btn" onclick="switchTab('members')"><i class="fas fa-users"></i> Members</button>
        </div>

        <!-- Books Tab -->
        <div id="books" class="tab-content active">
            <div class="panel">
                <h3><i class="fas fa-plus-circle"></i> Add New Book</h3>
                <form onsubmit="addBook(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Book Title *</label>
                            <input type="text" id="bookTitle" required placeholder="The Great Gatsby">
                        </div>
                        <div class="form-group">
                            <label>Author *</label>
                            <input type="text" id="bookAuthor" required placeholder="F. Scott Fitzgerald">
                        </div>
                        <div class="form-group">
                            <label>ISBN *</label>
                            <input type="text" id="bookISBN" required placeholder="978-0-7432-7356-5">
                        </div>
                        <div class="form-group">
                            <label>Category *</label>
                            <select id="bookCategory" required>
                                <option>Fiction</option>
                                <option>Non-Fiction</option>
                                <option>Science</option>
                                <option>Technology</option>
                                <option>History</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Book</button>
                </form>
            </div>

            <div class="panel">
                <h3><i class="fas fa-list"></i> Book Catalog</h3>
                <div id="booksList"></div>
                <div id="booksEmpty" class="empty-message" style="display: none;">
                    <p>No books in the library yet.</p>
                </div>
            </div>
        </div>

        <!-- Borrow/Return Tab -->
        <div id="borrow" class="tab-content">
            <div class="panel">
                <h3><i class="fas fa-exchange-alt"></i> Borrow/Return Book</h3>
                <form onsubmit="borrowBook(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Member Name *</label>
                            <input type="text" id="memberName" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Book ISBN *</label>
                            <input type="text" id="borrowISBN" required placeholder="978-0-7432-7356-5">
                        </div>
                        <div class="form-group">
                            <label>Action *</label>
                            <select id="action" required>
                                <option value="borrow">Borrow</option>
                                <option value="return">Return</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <button type="submit" class="btn btn-secondary"><i class="fas fa-check"></i> Process</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="panel">
                <h3><i class="fas fa-history"></i> Transaction History</h3>
                <div id="transactionHistory"></div>
                <div id="historyEmpty" class="empty-message" style="display: none;">
                    <p>No transactions yet.</p>
                </div>
            </div>
        </div>

        <!-- Members Tab -->
        <div id="members" class="tab-content">
            <div class="panel">
                <h3><i class="fas fa-user-plus"></i> Register New Member</h3>
                <form onsubmit="registerMember(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Member Name *</label>
                            <input type="text" id="memberFullName" required placeholder="Jane Smith">
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="memberEmail" required placeholder="jane@example.com">
                        </div>
                        <div class="form-group">
                            <label>Phone *</label>
                            <input type="tel" id="memberPhone" required placeholder="0596123494">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Register Member</button>
                </form>
            </div>

            <div class="panel">
                <h3><i class="fas fa-users"></i> Members List</h3>
                <div id="membersList"></div>
                <div id="membersEmpty" class="empty-message" style="display: none;">
                    <p>No members registered yet.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let books = JSON.parse(localStorage.getItem('libBooks')) || [
            { isbn: '978-0-7432-7356-5', title: 'The Great Gatsby', author: 'F. Scott Fitzgerald', category: 'Fiction', status: 'available' },
            { isbn: '978-0-06-112008-4', title: 'To Kill a Mockingbird', author: 'Harper Lee', category: 'Fiction', status: 'borrowed' }
        ];

        let members = JSON.parse(localStorage.getItem('libMembers')) || [
            { id: 1, name: 'John Doe', email: 'john@example.com', phone: '0596123494' },
            { id: 2, name: 'Jane Smith', email: 'jane@example.com', phone: '0596234567' }
        ];

        let transactions = JSON.parse(localStorage.getItem('libTransactions')) || [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');

            if (tab === 'books') renderBooks();
            else if (tab === 'borrow') renderTransactions();
            else if (tab === 'members') renderMembers();
        }

        function addBook(e) {
            e.preventDefault();
            const book = {
                isbn: document.getElementById('bookISBN').value,
                title: document.getElementById('bookTitle').value,
                author: document.getElementById('bookAuthor').value,
                category: document.getElementById('bookCategory').value,
                status: 'available'
            };

            if (books.some(b => b.isbn === book.isbn)) {
                alert('Book with this ISBN already exists!');
                return;
            }

            books.push(book);
            localStorage.setItem('libBooks', JSON.stringify(books));
            e.target.reset();
            renderBooks();
            updateStats();
        }

        function deleteBook(isbn) {
            if (confirm('Delete this book?')) {
                books = books.filter(b => b.isbn !== isbn);
                localStorage.setItem('libBooks', JSON.stringify(books));
                renderBooks();
                updateStats();
            }
        }

        function renderBooks() {
            const container = document.getElementById('booksList');
            const empty = document.getElementById('booksEmpty');

            if (books.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            container.innerHTML = books.map(book => `
                <div class="book-card">
                    <h4>${book.title}</h4>
                    <div class="book-info">
                        <div><strong>Author:</strong> ${book.author}</div>
                        <div><strong>ISBN:</strong> ${book.isbn}</div>
                        <div><strong>Category:</strong> ${book.category}</div>
                        <div><strong>Status:</strong> <span class="status ${book.status}">${book.status.toUpperCase()}</span></div>
                    </div>
                    <button class="btn btn-danger btn-small" onclick="deleteBook('${book.isbn}')"><i class="fas fa-trash"></i> Delete</button>
                </div>
            `).join('');
        }

        function borrowBook(e) {
            e.preventDefault();
            const memberName = document.getElementById('memberName').value;
            const isbn = document.getElementById('borrowISBN').value;
            const action = document.getElementById('action').value;

            const book = books.find(b => b.isbn === isbn);
            if (!book) {
                alert('Book not found!');
                return;
            }

            if (action === 'borrow' && book.status === 'borrowed') {
                alert('Book is already borrowed!');
                return;
            }

            if (action === 'return' && book.status === 'available') {
                alert('Book is not borrowed!');
                return;
            }

            book.status = action === 'borrow' ? 'borrowed' : 'available';
            
            transactions.unshift({
                date: new Date().toLocaleDateString(),
                member: memberName,
                book: book.title,
                action: action
            });

            localStorage.setItem('libBooks', JSON.stringify(books));
            localStorage.setItem('libTransactions', JSON.stringify(transactions));
            
            alert(`${action.toUpperCase()} successful!`);
            e.target.reset();
            renderTransactions();
            updateStats();
        }

        function renderTransactions() {
            const container = document.getElementById('transactionHistory');
            const empty = document.getElementById('historyEmpty');

            if (transactions.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--light);">
                            <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Date</th>
                            <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Member</th>
                            <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Book</th>
                            <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${transactions.map(t => `
                            <tr>
                                <td style="padding: 10px; border-bottom: 1px solid #eee;">${t.date}</td>
                                <td style="padding: 10px; border-bottom: 1px solid #eee;">${t.member}</td>
                                <td style="padding: 10px; border-bottom: 1px solid #eee;">${t.book}</td>
                                <td style="padding: 10px; border-bottom: 1px solid #eee;"><span class="status ${t.action === 'borrow' ? 'borrowed' : 'available'}">${t.action.toUpperCase()}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function registerMember(e) {
            e.preventDefault();
            const member = {
                id: members.length + 1,
                name: document.getElementById('memberFullName').value,
                email: document.getElementById('memberEmail').value,
                phone: document.getElementById('memberPhone').value
            };

            members.push(member);
            localStorage.setItem('libMembers', JSON.stringify(members));
            e.target.reset();
            renderMembers();
            updateStats();
        }

        function renderMembers() {
            const container = document.getElementById('membersList');
            const empty = document.getElementById('membersEmpty');

            if (members.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--light);">
                            <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Name</th>
                            <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Email</th>
                            <th style="padding: 10px; text-align: left; border-bottom: 2px solid #ddd;">Phone</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${members.map(m => `
                            <tr>
                                <td style="padding: 10px; border-bottom: 1px solid #eee;">${m.name}</td>
                                <td style="padding: 10px; border-bottom: 1px solid #eee;">${m.email}</td>
                                <td style="padding: 10px; border-bottom: 1px solid #eee;">${m.phone}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function updateStats() {
            document.getElementById('totalBooks').textContent = books.length;
            document.getElementById('availableBooks').textContent = books.filter(b => b.status === 'available').length;
            document.getElementById('borrowedBooks').textContent = books.filter(b => b.status === 'borrowed').length;
            document.getElementById('totalMembers').textContent = members.length;
        }

        // Initial render
        renderBooks();
        renderMembers();
        updateStats();
    </script>
</body>
</html>
