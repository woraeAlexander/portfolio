<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --danger: #d63031;
            --light: #f5f6fa;
            --dark: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--secondary);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(108, 92, 231, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #5544d3;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 12px;
            width: auto;
        }

        .btn-danger:hover {
            background: #c92e2e;
        }

        .table-panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        .table-panel h3 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--light);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: var(--light);
        }

        .student-id {
            font-weight: 600;
            color: var(--primary);
        }

        .grade {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            display: inline-block;
        }

        .grade.excellent {
            background: rgba(0, 184, 148, 0.2);
            color: #00b894;
        }

        .grade.good {
            background: rgba(108, 92, 231, 0.2);
            color: #6c5ce7;
        }

        .grade.average {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> Student Management System</h1>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalStudents">0</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgGrade">0</div>
                <div class="stat-label">Average GPA</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="topStudent">-</div>
                <div class="stat-label">Top Student</div>
            </div>
        </div>

        <div class="main-content">
            <div class="form-panel">
                <h3><i class="fas fa-user-plus"></i> Add Student</h3>
                <form id="studentForm">
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="text" id="studentId" placeholder="STU-001" required>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="studentName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="studentEmail" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Course</label>
                        <select id="studentCourse" required>
                            <option>Computer Science</option>
                            <option>Information Technology</option>
                            <option>Software Engineering</option>
                            <option>Data Science</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>GPA (0-4.0)</label>
                        <input type="number" id="studentGpa" placeholder="3.5" min="0" max="4" step="0.1" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Student</button>
                </form>
            </div>

            <div class="table-panel">
                <h3><i class="fas fa-users"></i> Student Records</h3>
                <div id="tableContainer"></div>
                <div id="emptyMsg" class="empty-message" style="display: none;">
                    <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>No students added yet. Use the form to add a student!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students')) || [
            { id: 'STU-001', name: 'Alice Johnson', email: 'alice@school.com', course: 'Computer Science', gpa: 3.8 },
            { id: 'STU-002', name: 'Bob Smith', email: 'bob@school.com', course: 'Information Technology', gpa: 3.5 },
            { id: 'STU-003', name: 'Carol White', email: 'carol@school.com', course: 'Software Engineering', gpa: 3.9 }
        ];

        const form = document.getElementById('studentForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const student = {
                id: document.getElementById('studentId').value,
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                course: document.getElementById('studentCourse').value,
                gpa: parseFloat(document.getElementById('studentGpa').value)
            };

            // Check for duplicate ID
            if (students.some(s => s.id === student.id)) {
                alert('Student ID already exists!');
                return;
            }

            students.push(student);
            localStorage.setItem('students', JSON.stringify(students));
            form.reset();
            render();
        });

        function deleteStudent(id) {
            if (confirm('Delete this student?')) {
                students = students.filter(s => s.id !== id);
                localStorage.setItem('students', JSON.stringify(students));
                render();
            }
        }

        function getGradeClass(gpa) {
            if (gpa >= 3.7) return 'excellent';
            if (gpa >= 3.0) return 'good';
            return 'average';
        }

        function getGradeLabel(gpa) {
            if (gpa >= 3.7) return 'Excellent';
            if (gpa >= 3.0) return 'Good';
            return 'Average';
        }

        function render() {
            const container = document.getElementById('tableContainer');
            const empty = document.getElementById('emptyMsg');

            if (students.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                updateStats();
                return;
            }

            empty.style.display = 'none';

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>GPA</th>
                            <th>Grade</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            students.forEach(student => {
                html += `
                    <tr>
                        <td class="student-id">${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.email}</td>
                        <td>${student.course}</td>
                        <td><strong>${student.gpa.toFixed(2)}</strong></td>
                        <td><span class="grade ${getGradeClass(student.gpa)}">${getGradeLabel(student.gpa)}</span></td>
                        <td><button class="btn btn-danger" onclick="deleteStudent('${student.id}')"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalStudents').textContent = students.length;
            
            if (students.length > 0) {
                const avgGpa = (students.reduce((sum, s) => sum + s.gpa, 0) / students.length).toFixed(2);
                const topStudent = students.reduce((top, s) => s.gpa > top.gpa ? s : top);
                
                document.getElementById('avgGrade').textContent = avgGpa;
                document.getElementById('topStudent').textContent = topStudent.name.split(' ')[0];
            }
        }

        render();
    </script>
</body>
</html>
